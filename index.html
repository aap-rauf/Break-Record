<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Break Tracker</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h2>⏱ Break Tracker</h2>

<button class="theme" onclick="darkMode()">🌙</button>

</header>



<section id="home">


<h3>Employees</h3>


<input id="empInput"
placeholder="Employee name">


<button onclick="addEmployee()"
class="btn">
+ Add Employee
</button>



<div id="employees"></div>



<button onclick="historyPage()"
class="btn">
📋 History
</button>


</section>





<section id="breakPage" class="hide">


<h2 id="empName"></h2>


<div class="timer">

00:00:00

</div>



<h3 id="status">

Ready

</h3>


<button onclick="start()"
class="start">

▶ Start Break

</button>



<button onclick="stop()"
class="stop">

⏹ Stop Break

</button>


<button onclick="back()"
class="btn">

Back

</button>


</section>






<section id="history" class="hide">


<h2>History</h2>


<button onclick="csv()"
class="btn">

Export CSV

</button>


<div id="records"></div>


<button onclick="back()"
class="btn">

Back

</button>


</section>



</div>


<script src="script.js"></script>


</body>

</html>
