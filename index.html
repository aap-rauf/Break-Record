<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Break Tracker</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="header">

<h2>Break Tracker</h2>

<button class="darkBtn" onclick="darkMode()">🌙</button>

</div>



<!-- HOME -->

<div id="home" class="card">


<h3>Employees</h3>


<input id="employeeInput"
placeholder="Employee name">


<button onclick="addEmployee()">
Add Employee
</button>



<div id="list"></div>



<button onclick="showHistory()">
History
</button>


</div>





<!-- BREAK PAGE -->


<div id="break" class="card hide">


<h2 id="name"></h2>


<h1 id="clock">
00:00:00
</h1>


<p id="status">
Ready
</p>



<button onclick="startBreak()">
Start Break
</button>


<button onclick="stopBreak()">
Stop Break
</button>


<button onclick="back()">
Back
</button>


</div>





<!-- HISTORY -->


<div id="historyPage" class="card hide">


<h3>History</h3>


<button onclick="csv()">
Export CSV
</button>


<button onclick="print()">
Export PDF
</button>



<table>


<tr>

<th>Name</th>
<th>Date</th>
<th>Start</th>
<th>End</th>
<th>Min</th>

</tr>


<tbody id="records"></tbody>


</table>


<button onclick="back()">
Back
</button>


</div>




<script src="script.js"></script>


</body>

</html>
