<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Break Tracker</title>

<meta name="theme-color"
content="#2563eb">

<link rel="manifest"
href="manifest.json">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<header>

<h2>⏱ Break Tracker</h2>

<button id="themeBtn"
onclick="toggleDark()">

🌙

</button>

</header>

<!-- HOME PAGE -->

<section id="homePage">

<div class="searchBox">

<input
id="empInput"
placeholder="Employee name">

<button
onclick="addEmployee()">

➕

</button>

</div>

<input
id="searchInput"
placeholder="Search employee..."
onkeyup="searchEmployee()">

<div id="employeeList"></div>

<button
class="mainBtn"
onclick="openHistory()">

📋 History

</button>

</section>

<!-- EMPLOYEE PAGE -->

<section
id="employeePage"
class="hide">

<button
class="backBtn"
onclick="goHome()">

← Back

</button>

<h2 id="employeeTitle"></h2>

<div
class="timer"
id="timer">

00:00:00

</div>

<div
id="breakStatus">

🟢 Working

</div>

<div
id="startTimeLabel">

</div>

<button

id="breakButton"

class="breakBtn"

onclick="toggleBreak()">

▶ START BREAK

</button>

</section>

<!-- HISTORY -->

<section
id="historyPage"
class="hide">

<div class="historyHeader">

<h2>History</h2>

<button
onclick="exportCSV()">

Export CSV

</button>

</div>

<div
id="historyList">

</div>

<button
class="mainBtn"
onclick="goHome()">

Back

</button>

</section>

</div>

<!-- Delete Employee Dialog -->

<div
id="deleteEmployeeDialog"
class="dialog hide">

<div class="dialogBox">

<h3>Delete Employee?</h3>

<p id="deleteEmployeeText"></p>

<div class="dialogButtons">

<button
onclick="closeDialogs()">

Cancel

</button>

<button
class="danger"

onclick="confirmDeleteEmployee()">

Delete

</button>

</div>

</div>

</div>

<!-- Delete History Dialog -->

<div
id="deleteHistoryDialog"
class="dialog hide">

<div class="dialogBox">

<h3>Delete Record?</h3>

<p id="deleteHistoryText"></p>

<div class="dialogButtons">

<button
onclick="closeDialogs()">

Cancel

</button>

<button
class="danger"

onclick="confirmDeleteHistory()">

Delete

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
